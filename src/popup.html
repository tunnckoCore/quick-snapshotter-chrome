<!DOCTYPE html>
<html>
<head>
  <title>Quick Snapshotter Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h2>Settings</h2>
  
  <div class="form-group">
    <label for="subfolder">Downloads Subfolder:</label>
    <div class="input-row">
      <span>Downloads/</span>
      <input type="text" id="subfolder" placeholder="screenshots" />
    </div>
    <small>Leave empty to save directly to Downloads.</small>
  </div>

  <div class="form-group">
    <label>Shortcut:</label>
    <div class="shortcut-info">
      <span id="current-shortcut">Ctrl+Shift+F</span>
      <button id="btn-shortcuts">Change</button>
    </div>
  </div>

  <button id="btn-save">Save Settings</button>
  <span id="save-status">Saved!</span>

  <script src="popup.js"></script>
</body>
</html>
